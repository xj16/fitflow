<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">Cancel</ion-button>
    </ion-buttons>
    <ion-title>{{ existing ? 'Edit Routine' : 'New Routine' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button strong="true" [disabled]="!canSave()" (click)="save()">
        Save
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list class="meta-list">
    <ion-item>
      <ion-input
        label="Routine name"
        labelPlacement="stacked"
        placeholder="e.g. Starting Strength"
        [value]="name()"
        (ionInput)="name.set($any($event).detail.value)"
      ></ion-input>
    </ion-item>
    <ion-item>
      <ion-input
        label="Description (optional)"
        labelPlacement="stacked"
        placeholder="3x5 linear progression"
        [value]="description()"
        (ionInput)="description.set($any($event).detail.value)"
      ></ion-input>
    </ion-item>
  </ion-list>

  @for (day of days(); track day.id) {
    <ion-card class="day-card">
      <ion-card-header>
        <div class="day-head">
          <ion-input
            class="day-name-input"
            [value]="day.name"
            (ionInput)="updateDayName(day.id, $any($event).detail.value)"
          ></ion-input>
          @if (days().length > 1) {
            <ion-button fill="clear" size="small" color="danger" (click)="removeDay(day.id)">
              <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
            </ion-button>
          }
        </div>
      </ion-card-header>
      <ion-card-content>
        @for (slot of day.slots; track slot.id) {
          <div class="slot">
            <div class="slot-head">
              <span class="slot-name">{{ slot.name }}</span>
              <ion-button fill="clear" size="small" color="medium" (click)="removeSlot(day.id, slot.id)">
                <ion-icon slot="icon-only" name="close-outline"></ion-icon>
              </ion-button>
            </div>
            <div class="slot-fields">
              <label>
                Sets
                <ion-input
                  type="number"
                  [value]="slot.targetSets"
                  (ionInput)="updateSlot(day.id, slot.id, 'targetSets', $any($event).detail.value)"
                ></ion-input>
              </label>
              <label>
                Reps
                <ion-input
                  type="number"
                  [value]="slot.targetReps"
                  (ionInput)="updateSlot(day.id, slot.id, 'targetReps', $any($event).detail.value)"
                ></ion-input>
              </label>
              <label>
                Start kg
                <ion-input
                  type="number"
                  [value]="slot.startWeight"
                  (ionInput)="updateSlot(day.id, slot.id, 'startWeight', $any($event).detail.value)"
                ></ion-input>
              </label>
              <label>
                +kg
                <ion-input
                  type="number"
                  [value]="slot.incrementKg"
                  (ionInput)="updateSlot(day.id, slot.id, 'incrementKg', $any($event).detail.value)"
                ></ion-input>
              </label>
            </div>
          </div>
        }
        <ion-button fill="clear" size="small" (click)="addSlot(day.id)">
          <ion-icon slot="start" name="add-circle-outline"></ion-icon>
          Add exercise
        </ion-button>
      </ion-card-content>
    </ion-card>
  }

  <ion-button expand="block" fill="outline" (click)="addDay()">
    <ion-icon slot="start" name="calendar-outline"></ion-icon>
    Add day
  </ion-button>
</ion-content>
