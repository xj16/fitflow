name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Angular 22 (CLI + @angular/build) requires Node >=22, and several
        # deps (@supabase/*, listr2) declare the same engine floor. Node 20 is
        # unsupported by this toolchain, so we only test on supported LTS lines.
        node: [22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build (with service worker)
        run: npm run build:prod

      - name: Unit tests + coverage gate
        run: npm run test:coverage
        env:
          COVERAGE_BROWSER: ChromeHeadlessNoSandbox

      - name: Upload coverage report
        if: matrix.node == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn

  demo:
    name: Build static demo bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build standalone static demo
        run: npm run build:demo

      - name: Upload demo bundle
        uses: actions/upload-artifact@v4
        with:
          name: fitflow-demo
          path: dist/fitflow/browser/
          if-no-files-found: error
