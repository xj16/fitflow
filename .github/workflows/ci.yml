name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Angular 22 (CLI + @angular/build) requires Node >=22, and several
        # deps (@supabase/*, listr2) declare the same engine floor. Node 20 is
        # unsupported by this toolchain, so we only test on supported LTS lines.
        node: [22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build:prod

      - name: Unit tests (headless Chrome)
        run: npm run test:ci
